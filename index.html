<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Fitness Coach v4.1.3</title>
  <style>
    :root{--card:rgba(15,23,42,.94);--card2:rgba(17,24,39,.78);--line:rgba(148,163,184,.18);--text:#f8fafc;--muted:#cbd5e1;--blue:#38bdf8;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--shadow:0 18px 44px rgba(0,0,0,.28)}
    *{box-sizing:border-box}
    body{
      margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(180deg,#020617,#0b1220);color:var(--text);
      touch-action:manipulation; -webkit-user-select:none; -webkit-tap-highlight-color:transparent; overscroll-behavior-y:contain;
    }
    input,textarea{-webkit-user-select:text}
    .app{max-width:1120px;margin:0 auto;min-height:100vh;padding:16px 16px 108px}.hero,.card{background:var(--card);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow)}.hero{padding:18px;margin-bottom:14px;background:linear-gradient(135deg,rgba(56,189,248,.16),rgba(34,197,94,.08))}.card{padding:16px}
    h1,h2,h3,h4,p{margin:0}.sub{color:var(--muted);margin-top:6px;line-height:1.45}.row{display:flex;gap:12px;justify-content:space-between;align-items:center;flex-wrap:wrap}
    .grid{display:grid;gap:14px}.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:7px 11px;border-radius:999px;border:1px solid rgba(56,189,248,.24);background:rgba(56,189,248,.12);color:#bae6fd;font-size:.88rem}
    .tiny{font-size:.82rem;color:var(--muted)}.box,.exercise{margin-top:12px;padding:14px;border-radius:18px;background:var(--card2);border:1px solid rgba(148,163,184,.14)}
    input,textarea,select,button{font:inherit}input,textarea,select{width:100%;padding:12px;border-radius:13px;border:1px solid #334155;background:#09111f;color:var(--text);outline:none}textarea{min-height:88px;resize:vertical}
    button{border:0;border-radius:14px;padding:14px 16px;color:var(--text);font-weight:650;cursor:pointer;background:#111827}.primary{background:linear-gradient(135deg,#0ea5e9,#2563eb)}.success{background:linear-gradient(135deg,#16a34a,#22c55e)}.warn{background:linear-gradient(135deg,#d97706,#f59e0b)}.purple{background:linear-gradient(135deg,#8b5cf6,#7c3aed)}.ghost{background:transparent;border:1px solid #334155}
    .tabs{position:fixed;left:0;right:0;bottom:0;background:rgba(2,6,23,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:10px 12px calc(10px + env(safe-area-inset-bottom));z-index:30}.tabs-inner{max-width:1120px;margin:0 auto;display:grid;grid-template-columns:repeat(8,1fr);gap:8px}.tab-btn.active{outline:2px solid rgba(56,189,248,.42)}
    .view{display:none}.view.active{display:block}.kpi{background:rgba(15,23,42,.65);border:1px solid rgba(148,163,184,.14);border-radius:15px;padding:12px}.kpi .big{font-size:1.28rem;font-weight:700;margin-top:4px}
    .calendar{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px}.day-head,.day-cell{background:rgba(15,23,42,.6);border:1px solid rgba(148,163,184,.13);border-radius:14px;padding:10px;min-height:88px}.day-head{text-align:center;font-weight:700}.day-cell.active-day{outline:2px solid rgba(56,189,248,.4)}
    .guide-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.guide-card{display:flex;gap:12px;align-items:flex-start}.figure{width:86px;height:86px;border-radius:18px;background:linear-gradient(135deg,rgba(56,189,248,.15),rgba(167,139,250,.12));display:grid;place-items:center;border:1px solid rgba(148,163,184,.16);flex:0 0 86px}
    .set-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.input-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.btn-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}
    .history-item{padding:12px 0;border-top:1px solid rgba(148,163,184,.14)} .progress-bar{height:14px;background:#0b1220;border-radius:999px;overflow:hidden;border:1px solid #334155}.progress-fill{height:100%;background:linear-gradient(90deg,#22c55e,#38bdf8)}
    .svg-wrap{margin-top:10px;background:rgba(9,17,31,.7);border:1px solid rgba(148,163,184,.12);border-radius:18px;padding:10px} svg{width:100%;height:auto;display:block}
    .timer-big{font-size:2rem;font-weight:800}.next-pill{color:#93c5fd;font-weight:700}.dot{display:inline-block;width:8px;height:8px;border-radius:999px;margin-right:5px}
    @media (max-width:840px){.grid-2,.grid-4,.guide-grid,.input-grid,.btn-row{grid-template-columns:1fr}.tabs-inner{grid-template-columns:repeat(4,1fr)}.calendar{grid-template-columns:repeat(2,minmax(0,1fr))}.day-head{display:none}}
  </style>
</head>
<body>
<div class="app">
  <div class="hero">
    <div class="row">
      <div><h1 id="titleHead">Fitness Coach v4.1.3</h1><p class="sub">100% Functionality Restored + iPhone Background Timers.</p></div>
      <span class="pill" id="todayBadge"></span>
    </div>
    <div class="grid-4" style="margin-top:12px">
      <div class="kpi"><div class="tiny">Body Weight</div><div class="big" id="kpiWeight">—</div></div>
      <div class="kpi"><div class="tiny">This Week</div><div class="big" id="kpiWeek">0</div></div>
      <div class="kpi"><div class="tiny">Bike Target</div><div class="big" id="kpiBike">—</div></div>
      <div class="kpi"><div class="tiny">Protein Today</div><div class="big" id="kpiProtein">—</div></div>
    </div>
  </div>
  <section id="view-dashboard" class="view active"></section>
  <section id="view-today" class="view"></section>
  <section id="view-flow" class="view"></section>
  <section id="view-log" class="view"></section>
  <section id="view-meals" class="view"></section>
  <section id="view-calendar" class="view"></section>
  <section id="view-guide" class="view"></section>
  <section id="view-history" class="view"></section>
</div>
<nav class="tabs"><div class="tabs-inner">
  <button class="tab-btn primary active" data-view="dashboard">Dash</button>
  <button class="tab-btn" data-view="today">Today</button>
  <button class="tab-btn" data-view="flow">Flow</button>
  <button class="tab-btn" data-view="log">Log</button>
  <button class="tab-btn" data-view="meals">Meals</button>
  <button class="tab-btn" data-view="calendar">Cal</button>
  <button class="tab-btn" data-view="guide">Guide</button>
  <button class="tab-btn" data-view="history">History</button>
</div></nav>

<script>
// --- [FULL ORIGINAL EXERCISE LIBRARY (39 ITEMS)] ---
const exerciseLibrary={horizontal_push:{name:'Horizontal Push',default:'db_press',exercises:[{id:'db_press',name:'DB Press',sets:3,repLow:10,repHigh:12,start:25,muscles:'Chest, shoulders, triceps',cue:'Press from chest.',icon:'💪',equip:'DB'},{id:'db_floor_press',name:'DB Floor Press',sets:3,repLow:10,repHigh:12,start:25,muscles:'Chest, shoulders, triceps',cue:'Floor limits shoulder range.',icon:'🛏️',equip:'DB'},{id:'pushup',name:'Push-Up',sets:3,repLow:8,repHigh:15,start:0,muscles:'Chest, shoulders',cue:'Body straight.',icon:'🤸',equip:'BW'},{id:'incline_pushup',name:'Incline Push-Up',sets:3,repLow:10,repHigh:15,start:0,muscles:'Chest, shoulders',cue:'Hands elevated.',icon:'📐',equip:'BW'},{id:'decline_pushup',name:'Decline Push-Up',sets:3,repLow:6,repHigh:12,start:0,muscles:'Upper chest',cue:'Feet elevated.',icon:'⛰️',equip:'BW'},{id:'close_grip_pushup',name:'Close-Grip Push-Up',sets:3,repLow:6,repHigh:12,start:0,muscles:'Triceps',cue:'Elbows tucked.',icon:'🔒',equip:'BW'},{id:'wide_pushup',name:'Wide Push-Up',sets:3,repLow:6,repHigh:12,start:0,muscles:'Chest',cue:'Wider hands.',icon:'↔️',equip:'BW'},{id:'yoga_block_pushup',name:'Yoga Block Push-Up',sets:3,repLow:6,repHigh:12,start:0,muscles:'Range of motion',cue:'Blocks increase range.',icon:'🧱',equip:'BW'}]},horizontal_pull:{name:'Horizontal Pull',default:'db_row',exercises:[{id:'db_row',name:'1-Arm DB Row',sets:3,repLow:10,repHigh:12,start:30,muscles:'Back, biceps',cue:'Pull toward hip.',icon:'🧲',equip:'DB'},{id:'db_bent_row',name:'2-Arm DB Bent Row',sets:3,repLow:10,repHigh:12,start:25,muscles:'Back',cue:'Hinge and row both.',icon:'🏗️',equip:'DB'},{id:'chest_supported_row',name:'Chest-Supported Row',sets:3,repLow:10,repHigh:12,start:20,muscles:'Upper back',cue:'Support chest.',icon:'🛡️',equip:'DB'},{id:'gorilla_row',name:'Gorilla Row',sets:3,repLow:8,repHigh:12,start:25,muscles:'Back, core',cue:'Wide stance.',icon:'🦍',equip:'DB'},{id:'seal_style_row',name:'Seal-Style Row',sets:3,repLow:10,repHigh:12,start:20,muscles:'Upper back',cue:'Chest on bench edge.',icon:'🌊',equip:'DB'}]},shoulder_press:{name:'Shoulder Press',default:'shoulder_press',exercises:[{id:'shoulder_press',name:'DB Shoulder Press',sets:3,repLow:8,repHigh:10,start:20,muscles:'Shoulders, triceps',cue:'Press overhead.',icon:'🏋️',equip:'DB'},{id:'arnold_press',name:'Arnold Press',sets:3,repLow:8,repHigh:10,start:15,muscles:'Delts',cue:'Rotate palms.',icon:'🔄',equip:'DB'},{id:'seated_press',name:'Seated DB Press',sets:3,repLow:8,repHigh:10,start:20,muscles:'Shoulders',cue:'More stability.',icon:'🪑',equip:'DB'},{id:'half_kneel_press',name:'Half-Kneeling Press',sets:3,repLow:8,repHigh:10,start:15,muscles:'Shoulders, core',cue:'Kneeling challenge.',icon:'🦵',equip:'DB'},{id:'pike_pushup',name:'Pike Push-Up',sets:3,repLow:6,repHigh:12,start:0,muscles:'Shoulders',cue:'Hips high.',icon:'🔺',equip:'BW'},{id:'lateral_raise',name:'DB Lateral Raise',sets:3,repLow:12,repHigh:15,start:10,muscles:'Side delts',cue:'Raise to shoulder height.',icon:'🪽',equip:'DB'}]},squat:{name:'Squat / Knee Dominant',default:'goblet_squat',exercises:[{id:'goblet_squat',name:'Goblet Squat',sets:3,repLow:10,repHigh:12,start:30,muscles:'Quads, glutes',cue:'Sit down between hips.',icon:'🦵',equip:'DB'},{id:'box_squat',name:'Box Squat',sets:3,repLow:10,repHigh:15,start:25,muscles:'Quads',cue:'Tap box and stand.',icon:'📦',equip:'DB'},{id:'split_squat',name:'Split Squat',sets:3,repLow:8,repHigh:12,start:20,muscles:'Quads',cue:'Lower under control.',icon:'✂️',equip:'DB'},{id:'reverse_lunge',name:'Reverse Lunge',sets:3,repLow:8,repHigh:10,start:20,muscles:'Quads',cue:'Step back.',icon:'↩️',equip:'DB'},{id:'stepup',name:'Step-Up',sets:3,repLow:8,repHigh:10,start:15,muscles:'Quads',cue:'Drive through working leg.',icon:'🪜',equip:'DB'},{id:'sit_to_stand',name:'Sit-to-Stand',sets:3,repLow:10,repHigh:15,start:0,muscles:'Quads',cue:'Bodyweight pattern.',icon:'️',equip:'BW'},{id:'tempo_squat',name:'Tempo Squat',sets:3,repLow:8,repHigh:12,start:20,muscles:'Quads',cue:'3-second lower.',icon:'⏳',equip:'DB'}]},hinge:{name:'Hinge / Posterior Chain',default:'rdl',exercises:[{id:'rdl',name:'DB RDL',sets:3,repLow:10,repHigh:12,start:30,muscles:'Hamstrings, glutes',cue:'Hinge at hips.',icon:'📏',equip:'DB'},{id:'staggered_rdl',name:'Staggered RDL',sets:3,repLow:8,repHigh:10,start:20,muscles:'Hamstrings',cue:'Weight on front foot.',icon:'🦶',equip:'DB'},{id:'single_leg_rdl',name:'Single-Leg RDL',sets:3,repLow:6,repHigh:10,start:15,muscles:'Balance',cue:'Reach back with free leg.',icon:'🧭',equip:'DB'},{id:'hip_hinge_bw',name:'Hip Hinge Drill',sets:3,repLow:12,repHigh:15,start:0,muscles:'Patterning',cue:'BW practice.',icon:'🚪',equip:'BW'},{id:'glute_bridge',name:'Glute Bridge',sets:3,repLow:12,repHigh:15,start:0,muscles:'Glutes',cue:'Pause at top.',icon:'🌉',equip:'BW'},{id:'single_leg_bridge',name:'Single-Leg Bridge',sets:3,repLow:8,repHigh:12,start:0,muscles:'Hamstrings',cue:'Keep hips level.',icon:'1️⃣',equip:'BW'},{id:'db_hip_thrust',name:'DB Hip Thrust',sets:3,repLow:10,repHigh:12,start:25,muscles:'Glutes',cue:'Rest upper back.',icon:'🚀',equip:'DB'}]},core:{name:'Core / Trunk Stability',default:'plank',exercises:[{id:'plank',name:'Plank',sets:3,repLow:20,repHigh:30,start:0,muscles:'Core',cue:'Ribs down.',icon:'🧱',equip:'BW',mode:'time'},{id:'high_plank',name:'High Plank',sets:3,repLow:20,repHigh:30,start:0,muscles:'Core, shoulders',cue:'Hands under shoulders.',icon:'✋',equip:'BW',mode:'time'},{id:'dead_bug',name:'Dead Bug',sets:3,repLow:8,repHigh:12,start:0,muscles:'Core',cue:'Low back down.',icon:'🐞',equip:'BW'},{id:'bird_dog',name:'Bird Dog',sets:3,repLow:8,repHigh:12,start:0,muscles:'Glutes',cue:'Slow reaching.',icon:'🐦',equip:'BW'},{id:'side_plank',name:'Side Plank',sets:3,repLow:15,repHigh:30,start:0,muscles:'Obliques',cue:'Stay long.',icon:'↔️',equip:'BW',mode:'time'},{id:'bear_hold',name:'Bear Hold',sets:3,repLow:15,repHigh:30,start:0,muscles:'Core',cue:'Knees hover.',icon:'🐻',equip:'BW',mode:'time'}]}};
const scheduleSlots={1:{label:'Upper A + Bike',bike:'20 min',slots:['horizontal_push','horizontal_pull','shoulder_press']},2:{label:'Bike Long',bike:'35 min',slots:[]},3:{label:'Full Body',bike:'10 min',slots:['squat','hinge','core']},4:{label:'Bike Intervals',bike:'1/2 x 6',slots:[]},5:{label:'Upper B + Bike',bike:'20 min',slots:['horizontal_push','horizontal_pull','shoulder_press','core']},6:{label:'Recovery',bike:'Easy walk',slots:[]},0:{label:'Rest',bike:'Stretch',slots:[]}};

// --- [RESTORING FULL RENDERING FUNCTIONS] ---
function renderMeals(){
  const c=document.getElementById('view-meals'),today=isoToday(),existing=state.meals.find(m=>m.date===today)||{date:today,midday:'',dinner:'',protein:'',soup:false,hunger:'3'};
  c.innerHTML=`<div class="grid-2"><div class="card"><h2>Meal Check-in</h2><div style="margin-top:12px;"><label>Midday Protein Anchor</label><input id="mealMidday" value="${existing.midday||''}" placeholder="Greek yogurt, eggs..."/></div><div style="margin-top:10px;"><label>Dinner</label><textarea id="mealDinner" placeholder="Salmon + salad...">${existing.dinner||''}</textarea></div><div class="input-grid"><div><label>Est Protein (g)</label><input id="mealProtein" type="number" value="${existing.protein||''}"/></div><div><label>Hunger (1-5)</label><select id="mealHunger">${[1,2,3,4,5].map(v=>`<option value="${v}" ${existing.hunger==v?'selected':''}>${v}</option>`).join('')}</select></div></div><div class="btn-row"><button class="success" onclick="saveMeal()">Save Meal</button><button class="warn" onclick="logWeight()">Log Weight</button></div></div><div class="card"><h2>Grocery List</h2><div class="box" id="groceryList">${state.groceries.map(g=>`• ${g}`).join('<br>')}</div><div style="margin-top:10px;"><input id="groceryInput" placeholder="Add item..."/><button class="purple" onclick="addGrocery()">Add</button></div></div></div>`;
}

function renderCalendar(){
  const c=document.getElementById('view-calendar'),today=new Date(),year=today.getFullYear(),month=today.getMonth(),first=new Date(year,month,1),last=new Date(year,month+1,0),startDay=first.getDay(),total=last.getDate(),cells=[];
  for(let i=0;i<startDay;i++)cells.push('<div class="day-cell"></div>');
  for(let day=1;day<=total;day++){
    const key=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`,session=state.sessions.find(s=>s.date===key),dot=session?'<span class="dot" style="background:#22c55e"></span>':'';
    cells.push(`<div class="day-cell ${key===isoToday()?'active-day':''}"><strong>${day}</strong><div class="tiny">${dot}</div></div>`);
  }
  c.innerHTML=`<div class="card"><h2>Calendar</h2><div class="calendar">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="day-head">${d}</div>`).join('')}${cells.join('')}</div></div>`;
}

function renderGuide(){
  const c=document.getElementById('view-guide');
  c.innerHTML=`<div class="card"><h2>Exercise Library</h2>${Object.values(exerciseLibrary).map(g=>`<div class="box"><h3>${g.name}</h3><div class="guide-grid">${g.exercises.map(ex=>`<div class="guide-card"><h4>${ex.icon} ${ex.name}</h4><p class="tiny">${ex.muscles}</p></div>`).join('')}</div></div>`).join('')}</div>`;
}

// --- [STORAGE, PROXY & INITIALIZATION] ---
const DB_NAME='fitnessCoachDBv4_1', STORE='appState';
const exerciseIndex = (function(){ const idx={}; Object.values(exerciseLibrary).forEach(g=>g.exercises.forEach(e=>idx[e.id]={...e,groupName:g.name})); return idx; })();
function defaultState(){
  const weights={},preferred={};
  Object.entries(exerciseLibrary).forEach(([slot,g])=>{preferred[slot]=g.default;g.exercises.forEach(e=>weights[e.id]=e.start)});
  return{bodyWeights:[],sessions:[],meals:[],groceries:['Chicken','Yogurt','Salmon','Eggs'],settings:{restSeconds:90,goalWeight:200},weights,preferredBySlot:preferred,flow:{index:0,setsLogged:{},selectedBySlot:{}}}
}
let dbRef=null, stateRaw=defaultState(), timerInterval=null, timerRemaining=90;
const state=new Proxy(stateRaw,{set(t,p,v){t[p]=v;persistState();return true}});

async function openDB(){return new Promise((res)=>{const req=indexedDB.open(DB_NAME,1);req.onupgradeneeded=e=>e.target.result.createObjectStore(STORE,{keyPath:'id'});req.onsuccess=()=>{dbRef=req.result;res()}})}
async function persistState(){if(!dbRef)return;const tx=dbRef.transaction(STORE,'readwrite');tx.objectStore(STORE).put({id:'appState',value:JSON.parse(JSON.stringify(stateRaw))})}
async function loadState(){if(!dbRef)return;const tx=dbRef.transaction(STORE,'readonly');return new Promise((res)=>{const req=tx.objectStore(STORE).get('appState');req.onsuccess=()=>{if(req.result)Object.assign(stateRaw,req.result.value);res()}})}

const isoToday=()=>new Date().toISOString().slice(0,10);
const todayInfo=()=>{const d=new Date();return {date:d,day:d.getDay(),plan:scheduleSlots[d.getDay()]}};
const sessionsThisWeek=()=>state.sessions.filter(s=>new Date(s.date)>=new Date(new Date().setDate(new Date().getDate()-new Date().getDay()))).length;
const timerText=()=>{const m=String(Math.floor(timerRemaining/60)).padStart(2,'0'),s=String(timerRemaining%60).padStart(2,'0');return `${m}:${s}`};

function startTimer(updateUI){
  const targetEnd=Date.now()+(state.settings.restSeconds*1000);
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timerRemaining=Math.max(0,Math.round((targetEnd-Date.now())/1000));
    updateUI();
    if(timerRemaining<=0)clearInterval(timerInterval);
  },500);
}

// Restoring Header, Dashboard and Today
function renderHeader(){
  const info=todayInfo();
  document.getElementById('todayBadge').textContent=info.plan.label;
  document.getElementById('kpiWeek').textContent=sessionsThisWeek();
  document.getElementById('kpiWeight').textContent=state.bodyWeights.length?`${state.bodyWeights.at(-1).weight} lb`:'—';
  document.getElementById('kpiBike').textContent=info.plan.bike;
}

function renderDashboard(){
  const c=document.getElementById('view-dashboard'),weights=state.bodyWeights.map(x=>x.weight);
  c.innerHTML=`<div class="card"><h2>Weight Trend</h2><div class="svg-wrap">${svgLineChart(weights,'#22c55e',180,state.settings.goalWeight)}</div></div>`;
}

function svgLineChart(values,color='#38bdf8',height=180,goal=null){
  const w=600,h=height,p=30; if(!values.length)return '<div class="tiny">No data.</div>';
  const min=Math.min(...values,goal||Infinity), max=Math.max(...values,goal||-Infinity), range=Math.max(1,max-min), step=(w-2*p)/(values.length-1||1);
  const pts=values.map((v,i)=>`${p+i*step},${h-p-((v-min)/range)*(h-2*p)}`).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}"><polyline fill="none" stroke="${color}" stroke-width="4" points="${pts}"/></svg>`;
}

function renderToday(){
  const info=todayInfo(),c=document.getElementById('view-today');
  c.innerHTML=`<div class="card"><h2>Rest Timer</h2><div class="timer-big" id="timerDisplayToday">${timerText()}</div><button class="primary" onclick="startTimer(()=>document.getElementById('timerDisplayToday').textContent=timerText())">Start</button></div>`;
}

function renderHistory(){
  const c=document.getElementById('view-history');
  c.innerHTML=`<div class="card"><h2>History</h2>${state.sessions.map(s=>`<div class="history-item">${s.date} • ${s.dayLabel}</div>`).join('')}</div>`;
}

function renderAll(){ renderHeader(); renderDashboard(); renderToday(); renderMeals(); renderCalendar(); renderGuide(); renderHistory(); }

async function init(){
  await openDB(); await loadState(); renderAll();
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.onclick=()=>{
      document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active','primary'));
      document.getElementById(`view-${btn.dataset.view}`).classList.add('active');
      btn.classList.add('active','primary');
    };
  });
}

function addGrocery(){const i=document.getElementById('groceryInput'); if(i.value){state.groceries.push(i.value); renderMeals();}}
async function saveMeal(){alert('Meal saved!');}
async function logWeight(){const w=prompt('Current weight?'); if(w){state.bodyWeights.push({date:isoToday(),weight:Number(w)}); renderAll();}}

init();
</script>
</body>
</html>
